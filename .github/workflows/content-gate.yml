name: Content gate

# Vets every PR before it can merge. Two checks: the structural gate
# (scripts/content-gate.mjs — tier tag, bilingual pair, essay sources) and a
# full build (frontmatter schema + site builds). Runs on every PR with no
# `paths` filter on purpose: a path-filtered workflow that gets skipped leaves
# its check stuck in Pending, which would permanently block any non-content PR
# once this is a required status check. The gate script no-ops when a PR changes
# no posts, so non-content PRs pass cheaply.
on:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the gate diffs against the PR base
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Astro 6 requires Node >=22.12
          cache: npm
      - run: npm ci
      - name: Content gate (structural checks on changed posts)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/content-gate.mjs
      - name: Build (schema + full site)
        run: npm run build
